modLoader="javafml"
loaderVersion="${loader_version_range}"
license="MIT"

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="tconstruct"
    mandatory=true
    versionRange="${tconstruct_version_range}"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="mantle"
    mandatory=true
    versionRange="${mantle_version_range}"
    ordering="AFTER"
    side="BOTH"

# Apotheosis: optional - we detect it at runtime and the item-level changes we
# make propagate automatically into Apoth's custom menus.
[[dependencies.${mod_id}]]
    modId="apotheosis"
    mandatory=false
    versionRange="[7,)"
    ordering="AFTER"
    side="BOTH"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/Texbio/TinkersWithEnchants"
logoFile="tinkerswithenchants.png"
description='''
${mod_description}
'''
authors="${mod_authors}"
